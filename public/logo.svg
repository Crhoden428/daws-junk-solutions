<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 58" fill="none">
  <!-- Truck cab -->
  <path d="M2 26 L2 46 L36 46 L36 26 L28 26 L24 14 L2 14 Z" fill="white"/>
  <!-- Windshield -->
  <rect x="5" y="17" width="17" height="10" rx="1.5" fill="#111111"/>
  <!-- Door window -->
  <rect x="24" y="28" width="9" height="8" rx="1" fill="#111111"/>

  <!-- Hitch arm -->
  <rect x="36" y="39" width="10" height="4" rx="1" fill="white"/>

  <!-- Dump trailer body -->
  <path d="M46 18 L124 18 L124 44 L46 44 Z" fill="white"/>
  <!-- Orange accent stripe -->
  <rect x="46" y="40" width="78" height="4" rx="0" fill="#ea580c"/>
  <!-- Trailer interior shadow -->
  <path d="M50 22 L120 22 L120 40 L50 40 Z" fill="#e5e5e5"/>

  <!-- Hinge at back of trailer -->
  <rect x="122" y="16" width="4" height="30" rx="2" fill="#cccccc"/>

  <!-- Wheels -->
  <circle cx="20" cy="49" r="6" fill="#222" stroke="white" stroke-width="2"/>
  <circle cx="20" cy="49" r="2" fill="white"/>
  <circle cx="68" cy="49" r="6" fill="#222" stroke="white" stroke-width="2"/>
  <circle cx="68" cy="49" r="2" fill="white"/>
  <circle cx="96" cy="49" r="6" fill="#222" stroke="white" stroke-width="2"/>
  <circle cx="96" cy="49" r="2" fill="white"/>

  <!-- Brand text -->
  <text x="142" y="28" font-family="Impact, Arial Black, sans-serif" font-size="23" font-weight="900" fill="white" letter-spacing="1.5">DAW'S</text>
  <text x="142" y="44" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700" fill="white" letter-spacing="3.5">JUNK SOLUTIONS</text>

  <!-- Orange dot accent -->
  <circle cx="134" cy="36" r="3" fill="#ea580c"/>
</svg>
